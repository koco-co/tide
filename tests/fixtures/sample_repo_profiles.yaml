profiles:
  - name: dt-center-assets
    path: .tide/repos/CustomItem/dt-center-assets
    branch: release_6.2.x
    url_prefixes:
      - /dassets/v1/
    modules:
      - pattern: "com.dtstack.assets.controller"
        description: "Controller layer"
      - pattern: "com.dtstack.assets.service"
        description: "Service layer"

  - name: dt-center-metadata
    path: .tide/repos/CustomItem/dt-center-metadata
    branch: release_6.2.x
    url_prefixes:
      - /dmetadata/v1/
    modules:
      - pattern: "com.dtstack.metadata.controller"
        description: "Controller layer"

db:
  host: 172.16.115.247
  port: 3306
  user: root
  password: "${DB_PASSWORD}"
  database: dtinsight

notifications:
  - type: dingtalk
    webhook: "${DINGTALK_WEBHOOK}"
